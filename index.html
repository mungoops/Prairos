const sumS=sc=>Object.values(sc).reduce((a,b)=>a+(b||0),0);
const getGaps=intel=>INTEL.map(t=>({...t,s:intel[t.k]?.s||0,p:intel[t.k]?.p||0,pl:intel[t.k]?.pl||0,gap:(intel[t.k]?.s||0)-(intel[t.k]?.p||0)})).sort((a,b)=>b.gap-a.gap);
const getRouter=intel=>{const gaps=getGaps(intel);const topS=[...gaps].sort((a,b)=>b.s-a.s)[0];const hidden=gaps.find(g=>g.s>=4&&g.p<=2);const blocking=gaps.find(g=>g.s<=2&&g.pl>=3);return{topS,hidden,blocking,rec:hidden?`Build proof for "${hidden.label}" — it is a real strength that is not yet visible.`:blocking?`"${blocking.label}" may be getting in your way. A little support here could unlock placement.`:`Package your "${topS?.label||'strongest area'}" into proof.`,prompt:INTEL.find(i=>i.k===(hidden||topS||{k:''}).k)?.p||''};};
/* Plain-language insight for the user's final summary */
const getInsight=intel=>{const r=getRouter(intel);if(r.hidden)return`Your biggest opportunity right now is "${r.hidden.label}." You are clearly strong here, but it is not yet visible to the people who matter. That makes it the highest-value place to build one solid piece of proof.`;if(r.blocking)return`One area — "${r.blocking.label}" — may be holding you back more than it should. A small, focused step here could open up your next move.`;if(r.topS)return`Your strongest area is "${r.topS.label}." Lead with it. The fastest way to be recognized is to make this strength impossible to miss.`;return'Complete the Strengths page to see your personalized insight here.';};

/* Derive the Proof Loop status badge from the understanding-check result + signals */
const getLoopStatus=st=>{
  const r=st.pla.ucResult||'';
  const hasSignal=(st.pace||[]).some(a=>a.type==='signal')||(st.pla.paid&&st.pla.paid.trim());
  if(hasSignal&&r==='They understood it')return{label:'Signal received',clr:GR,bg:GLt};

  if(r==='They partly understood it'||r==='I need to simplify it')return{label:'Needs revision',clr:O,bg:OLt};
  if(r==='They missed the point'||r==='I need a different audience')return{label:'Needs revision',clr:O,bg:OLt};
  if(r&&r!=='I have not shared it yet')return{label:'Shared',clr:T,bg:TLt};
  if(st.sf.draft)return{label:'Not shared yet',clr:TL,bg:BG};
  return{label:'Building proof',clr:TL,bg:BG};
};

/* ── STORAGE ── */
async function saveState(st){
  try {
    const data=JSON.stringify(st);
    if(window.storage&&window.storage.set){await window.storage.set('prairos_tester_clean',data);}
    else{localStorage.setItem('prairos_tester_clean',data);}
    return true;
  } catch(e){console.error('Save failed:',e);return false;}
}
async function loadState(){
  try {
    if(window.storage&&window.storage.get){const r=await window.storage.get('prairos_tester_clean');if(r)return JSON.parse(r.value);}
    const local=localStorage.getItem('prairos_tester_clean');
    if(local)return JSON.parse(local);
  } catch(e){console.error('Load failed:',e);}
  return null;
}

/* Flattens a completed session into one row of fields and sends it to the
   Google Sheet. Uses no-cors + form-encoding so it works from a static file
   without triggering CORS errors. Silently no-ops if SHEET_URL is blank. */
async function submitToSheet(st){
  if(!SHEET_URL)return false;
  try{
    const detected=getRouter(st.intel);
    const payload={
      submittedAt:new Date().toISOString(),
      version:VERSION,
      pid:st.pid||'', name:st.name||'', email:st.email||'',
      consentContact:st.consentC?'yes':'no', consentTestimonial:st.consentT?'yes':'no',
      path:PATHS.find(x=>x.k===st.path)?.tag||'', seeking:(st.seeking||[]).join('; '),
      beforeScore:sumS(st.bScore), afterScore:sumS(st.fScore), scoreChange:sumS(st.fScore)-sumS(st.bScore),
      strongestArea:detected.topS?.label||'', hiddenStrength:detected.hidden?.label||'',
      situation:st.intake.sit||'', overgeneralize:st.intake.over||'', desiredOutcome:st.intake.out||'',
      usingAI:st.intake.ai||'', opportunity:st.intake.opp||'',
      currentSelfTalk:st.intake.cst||'', desiredSelfTalk:st.intake.dst||'', courageStep:st.intake.courage||'',
      patternStatement:st.pf.stmt||'', judgmentSummary:st.jm.def||'',
      aiBoundarySummary:st.aiSum||'', judgmentStory:st.sf.draft||'',
      placementWhere:(st.pla.dests||[]).join('; '), placementAudience:st.pla.aud||'',
      ucWho:st.pla.ucWho||'', ucWhat:st.pla.ucWhat||'', ucHow:st.pla.ucHow||'', ucResult:st.pla.ucResult||'',
      next7days:st.pla.n7||'', next30days:st.pla.n30||'', successSignal:st.pla.paid||'',
      reflectionBefore:st.testy.bef||'', reflectionAfter:st.testy.aft||'', mostUseful:st.testy.useful||'',
      wouldRecommend1to5:st.testy.rec||'', wouldPay:st.testy.pay||st.wtp||'', priceRange:st.prange||'',
      wouldRefer:st.testy.refer||'', referralName:st.testy.refName||'', referralContact:st.testy.refContact||'',
      testimonialPermission:st.testy.perm||'',
      wantsFeedback:st.feedback.want?'yes':'no', feedbackNote:st.feedback.note||'',
      intendedFirstUse:st.iuc||'', whyNow:st.fur||'',
    };
    const body=new URLSearchParams();
    Object.entries(payload).forEach(([k,v])=>body.append(k,String(v)));
    await fetch(SHEET_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:body.toString()});
    return true;
  }catch(e){console.error('Sheet submit failed:',e);return false;}
}

function Btn({children,onClick,variant='navy',size='md',style:ex={},disabled}){
  const v={navy:{bg:N,c:CA},teal:{bg:T,c:CA},orange:{bg:O,c:CA},green:{bg:GR,c:CA},gold:{bg:G,c:CA},ghost:{bg:'transparent',c:CA,b:'1px solid rgba(255,255,255,0.35)'},secondary:{bg:BG,c:TX,b:`1px solid ${BO}`},danger:{bg:RLt,c:R,b:`1px solid ${R}`}}[variant]||{bg:N,c:CA};
  const sz=size==='sm'?{padding:'5px 12px',fontSize:12}:size==='lg'?{padding:'11px 24px',fontSize:14}:{padding:'8px 16px',fontSize:13};
  return(<button type="button" onClick={disabled?undefined:onClick} style={{...sz,borderRadius:8,fontFamily:'inherit',fontWeight:600,cursor:disabled?'not-allowed':'pointer',border:v.b||'none',background:disabled?BO:v.bg,color:disabled?TL:v.c,transition:'all 0.15s',display:'inline-flex',alignItems:'center',gap:6,...ex}}>{children}</button>);
}
function Fld({label:lb,children,hint}){return(<div style={{marginBottom:14}}>{lb&&<label style={SX.lbl}>{lb}</label>}{hint&&<div style={{fontSize:11,color:TL,marginBottom:5,lineHeight:1.5}}>{hint}</div>}{children}</div>);}
function Inp({value,onChange,placeholder,type='text',style:ex={}}){return <input type={type} value={value} onChange={onChange} placeholder={placeholder} style={{...SX.inp,...ex}}/>;}
function Ta({value,onChange,placeholder,rows=3,style:ex={}}){return <textarea value={value} onChange={onChange} placeholder={placeholder} rows={rows} style={{...SX.ta,...ex}}/>;}
function Sel({value,onChange,options,placeholder,style:ex={}}){return(<select value={value} onChange={onChange} style={{...SX.sel,...ex}}>{placeholder&&<option value="">{placeholder}</option>}{options.map(o=>typeof o==='string'?<option key={o} value={o}>{o}</option>:<option key={o.k} value={o.k}>{o.label}</option>)}</select>);}
function Badge({text,clr=N,bg=TLt,style:ex={}}){return(<span style={{display:'inline-block',padding:'3px 10px',borderRadius:100,fontSize:11,fontWeight:600,background:bg,color:clr,border:`1px solid ${clr}25`,...ex}}>{text}</span>);}
function PBar({v,max=100,clr=T,style:ex={}}){return(<div style={{background:BO,borderRadius:100,height:8,overflow:'hidden',...ex}}><div style={{width:`${Math.min(100,(v/max)*100)}%`,height:'100%',background:clr,borderRadius:100,transition:'width 0.4s'}}/></div>);}
function MCard({label,value,sub,clr=N}){return(<div style={{background:CA,borderRadius:12,padding:'16px 18px',boxShadow:'0 1px 8px rgba(22,57,92,0.07)'}}><div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:32,fontWeight:800,color:clr}}>{value}</div><div style={{fontSize:12,fontWeight:600,color:TM,marginTop:2}}>{label}</div>{sub&&<div style={{fontSize:11,color:TL,marginTop:1}}>{sub}</div>}</div>);}
function Alrt({children,type='info',style:ex={}}){const c={info:{bg:TLt,clr:'#0e6676',b:`1px solid ${T}40`},warn:{bg:GLd,clr:'#7a5a00',b:'1px solid rgba(201,168,76,0.4)'},success:{bg:GLt,clr:'#1a5c40',b:'1px solid rgba(45,122,95,0.3)'},danger:{bg:RLt,clr:R,b:`1px solid ${R}30`}}[type]||{bg:TLt,clr:'#0e6676',b:`1px solid ${T}40`};return(<div style={{padding:'12px 16px',borderRadius:10,fontSize:13,lineHeight:1.6,background:c.bg,color:c.clr,border:c.b,...ex}}>{children}</div>);}
function DraftBox({title,value,onChange,rows=5}){
  return(<div style={SX.card()}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
      <h3 style={{...SX.h3,marginBottom:0}}>{title}</h3>
      <span style={{fontSize:11,color:TL}}>Your draft — edit freely</span>
    </div>
    <Ta value={value} onChange={onChange} rows={rows}/>
  </div>);
}
function NextBtn({onClick,children='Continue →'}){return(<div style={{display:'flex',justifyContent:'flex-end'}}><Btn onClick={onClick} variant="navy" size="lg">{children}</Btn></div>);}

/* Wordmark with the "i" dot rendered as the orange node (round), matching the logo */
function Wordmark({size=18,color=N}){
  const dot=size*0.2;
  return(
    <span style={{fontWeight:800,fontSize:size,letterSpacing:'-0.02em',lineHeight:1,color,display:'inline-flex',alignItems:'baseline'}}>
      Pra<span style={{position:'relative',display:'inline-block'}}>ı<span style={{position:'absolute',top:`-${size*0.30}px`,left:'50%',transform:'translateX(-50%)',width:dot,height:dot,background:O,borderRadius:'50%'}}/></span>ros
    </span>
  );
}

function Logo({size=32,reversed=false}){
  // reversed=true renders light strokes for use on the navy banner (keeps orange accent)
  const ring=reversed?'rgba(255,255,255,0.55)':'var(--c-t)';
  const tree=reversed?'#ffffff':'var(--c-n)';
  const node=reversed?'rgba(255,255,255,0.85)':'var(--c-t)';
  return(
    <svg width={size} height={size} viewBox="0 0 100 100" fill="none">
      <path d="M44 11 A40 40 0 0 0 12 44" stroke={ring} strokeWidth="4.5" strokeLinecap="round"/>
      <path d="M56 11 A40 40 0 0 1 88 44" stroke={ring} strokeWidth="4.5" strokeLinecap="round"/>
      <path d="M13 56 A40 40 0 0 0 87 56" stroke={tree} strokeWidth="4.5" strokeLinecap="round"/>
      <line x1="50" y1="82" x2="50" y2="50" stroke={tree} strokeWidth="5" strokeLinecap="round"/>
      <path d="M50 52 C44 44 38 40 30 37" stroke={tree} strokeWidth="4.5" strokeLinecap="round"/>
      <path d="M50 52 C56 44 62 40 70 37" stroke={tree} strokeWidth="4.5" strokeLinecap="round"/>
      <path d="M50 50 C49 42 50 36 50 32" stroke={tree} strokeWidth="4" strokeLinecap="round"/>
      <line x1="30" y1="37" x2="22" y2="33" stroke={tree} strokeWidth="3" strokeLinecap="round"/>
      <line x1="70" y1="37" x2="78" y2="33" stroke={tree} strokeWidth="3" strokeLinecap="round"/>
      <circle cx="50" cy="11" r="6.5" fill={O}/>
      <circle cx="30" cy="37" r="4.5" fill={node}/>
      <circle cx="70" cy="37" r="4.5" fill={node}/>
      <circle cx="50" cy="82" r="5" fill={node}/>
    </svg>
  );
}

/* The Prairos Proof Loop — a simple vertical 7-step loop. `activeIdx` highlights
   how far the user has come; `compact` renders a smaller version for Home. */
function ProofLoop({activeIdx=-1,compact=false}){
  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:0}}>
      {PROOF_LOOP.map((s,i)=>{
        const done=i<=activeIdx;
        return(
          <div key={s.key} style={{display:'flex',flexDirection:'column',alignItems:'center'}}>
            <div style={{display:'flex',alignItems:'center',gap:8,padding:compact?'5px 12px':'8px 16px',borderRadius:100,background:done?N:BG,border:`1px solid ${done?N:BO}`,minWidth:compact?180:220,justifyContent:'center'}}>
              <span style={{width:18,height:18,borderRadius:'50%',background:done?O:BO,color:done?'#fff':TL,fontSize:10,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{i+1}</span>
              <span style={{fontSize:compact?11:12,fontWeight:600,color:done?'#fff':TM}}>{s.step}</span>
            </div>
            {i<PROOF_LOOP.length-1&&<div style={{width:2,height:compact?10:14,background:done?N:BO}}/>}
          </div>
        );
      })}
      <div style={{fontSize:11,color:TL,marginTop:8,display:'flex',alignItems:'center',gap:6}}><span style={{fontSize:14}}>↺</span> stronger proof, next time around</div>
    </div>
  );
}

function ScoresView({st,set,which='bScore'}){
  const scores=st[which];const total=sumS(scores);const isBase=which==='bScore';
  const lift=!isBase?total-sumS(st.bScore):null;
  const upd=(k,v)=>set(p=>({...p,[which]:{...p[which],[k]:v}}));
  return(
    <div>
      <h2 style={SX.h2}>{isBase?'Where You Are Now':'Where You Are Now (Round Two)'}</h2>
      <p style={{fontSize:13,color:TM,marginBottom:16}}>Rate each one honestly, 1 to 5. This is a starting point, not a test. {isBase?'You will rate these again at the end to see how far you have come.':''}</p>
      {!isBase&&sumS(st.bScore)>0&&(<Alrt type="info" style={{marginBottom:16}}>You started at <strong>{sumS(st.bScore)}/40</strong>. Right now: <strong>{total}/40</strong>.{lift!==null&&lift>0&&<span style={{color:GR}}> <strong>+{lift}!</strong></span>}</Alrt>)}
      <div style={SX.card()}>
        {SCATS.map(c=>(
          <div key={c.k} style={{marginBottom:12}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:2}}><div style={{fontSize:13,fontWeight:600,color:N}}>{c.label}</div><div style={{fontSize:11,color:TL}}>{scores[c.k]||0}/5</div></div>
            <div style={{fontSize:11,color:TM,marginBottom:5}}>{c.d}</div>
            <div style={{display:'flex',gap:4}}>{[1,2,3,4,5].map(i=>(<button key={i} type="button" onClick={()=>upd(c.k,i)} style={{flex:1,padding:'7px 0',borderRadius:6,border:`1px solid ${scores[c.k]>=i?(isBase?N:GR):BO}`,background:scores[c.k]>=i?(isBase?N:GR):CA,color:scores[c.k]>=i?CA:TL,fontFamily:'inherit',fontSize:12,fontWeight:600,cursor:'pointer'}}>{i}</button>))}</div>
          </div>
        ))}

  const sec=(title,body)=>`<h2>${title}</h2>${body}`;
  const para=t=>`<div class="box">${esc(t)||'<span class="empty">(not completed)</span>'}</div>`;
  return `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Prairos Report — ${esc(st.name||st.pid||'Participant')}</title>

h1{font-size:32px;color:#16395c;font-weight:800}h2{font-size:18px;color:#16395c;margin:26px 0 8px;font-weight:800}

.empty{color:#aaa;font-style:italic}.scores{display:flex;gap:24px;margin:10px 0}.score b{font-size:30px;color:#16395c}
.foot{margin-top:40px;padding-top:14px;border-top:1px solid #e0dad0;color:#999;font-size:11px;line-height:1.7}

<h1>Prairos</h1><div class="sub">Human judgment, precisely placed.</div>
<div class="meta">${esc(st.name||'')} ${st.pid?'· '+esc(st.pid):''} · ${new Date().toLocaleDateString()}</div>
${bl>0&&fl>0?`${sec('Your Growth',`<div class="scores"><div class="score">Start<br><b>${bl}</b>/40</div><div class="score">End<br><b>${fl}</b>/40</div><div class="score">Change<br><b>${fl-bl>0?'+':''}${fl-bl}</b></div></div><div class="box">${esc(getInsight(st.intel))}</div>`)}`:''}

${st.testy.bef||st.testy.aft?sec('Your Reflections',`${para('Before: '+st.testy.bef)}${para('Now: '+st.testy.aft)}`):''}

  const [theme,setTheme]=useState('light');
  const [welcomeBack,setWelcomeBack]=useState(false);
  const [savedTick,setSavedTick]=useState(false);
  const mainRef=useRef(null);

  const flash=msg=>{setToast(msg);setTimeout(()=>setToast(''),2600);};

  /* Apply theme variables to :root */
  useEffect(()=>{
    const vars=THEMES[theme]||THEMES.light;
    Object.entries(vars).forEach(([k,v])=>document.documentElement.style.setProperty(k,v));
    document.documentElement.style.colorScheme=theme;
    if(document.body)document.body.style.background=vars['--c-bg'];
  },[theme]);

  /* Detect the user's preferred color scheme once on load */
  useEffect(()=>{
    try{const mq=window.matchMedia('(prefers-color-scheme: dark)');setTheme(mq.matches?'dark':'light');
      const onChange=e=>setTheme(e.matches?'dark':'light');
      mq.addEventListener?.('change',onChange);
      return ()=>mq.removeEventListener?.('change',onChange);
    }catch(e){}
  },[]);

  useEffect(()=>{
    const check=()=>{const m=window.innerWidth<820;setIsMobile(m);setSideOpen(!m);};
    check();
    window.addEventListener('resize',check);
    return ()=>window.removeEventListener('resize',check);
  },[]);

  useEffect(()=>{
    const link=document.createElement('link');link.rel='stylesheet';
    link.href='https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap';
    document.head.appendChild(link);
    const st2=document.createElement('style');
    st2.textContent=`
      button:focus-visible,a:focus-visible,input:focus-visible,textarea:focus-visible,select:focus-visible{outline:3px solid #3fc4c4;outline-offset:2px}
      ::placeholder{opacity:0.7}
      @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
      @media (max-width:820px){
        input,textarea,select{font-size:16px!important}  /* prevents iOS zoom-on-focus */
        button{min-height:40px}
      }
    `;
    document.head.appendChild(st2);
  },[]);

  useEffect(()=>{if(!loaded){loadState().then(saved=>{if(saved){set(prev=>({...mkSt(),...saved}));if(saved.done&&saved.done.length>0)setWelcomeBack(true);}setLoaded(true);});}},[loaded]);
  useEffect(()=>{if(loaded){saveState(st);setSavedTick(true);const t=setTimeout(()=>setSavedTick(false),1200);return ()=>clearTimeout(t);}},[st,loaded]);
  /* item 3: scroll to top of content on every view change */
  useEffect(()=>{if(mainRef.current)mainRef.current.scrollTo({top:0,behavior:'auto'});window.scrollTo(0,0);},[st.view]);

  const nav=id=>{set(p=>({...p,view:id}));if(isMobile)setSideOpen(false);};
  const resetData=()=>{if(window.confirm('Reset all local data? This cannot be undone.')){const ns=mkSt();set(ns);saveState(ns);flash('All data cleared.');}};

  const exportJSON=()=>{
    try{const blob=new Blob([JSON.stringify(st,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`prairos-${VERSION}-${st.pid||'data'}-${new Date().toISOString().slice(0,10)}.json`;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);flash('Data file downloaded.');}
    catch(e){flash('Download blocked here — try the downloaded HTML version in your browser.');}
  };
  const exportReport=()=>{
    try{const blob=new Blob([buildReport(st)],{type:'text/html'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`prairos-${VERSION}-report-${st.pid||'me'}.html`;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);flash('Report downloaded — open it in any browser.');}
    catch(e){flash('Download blocked here — works in the downloaded HTML version.');}
  };
  const emailReport=()=>{
    const subj=encodeURIComponent(`Prairos feedback request — ${st.name||st.pid||'participant'}`);
    const body=encodeURIComponent(`Hi,\n\nI just finished Prairos and I'd like feedback.\n\nWhat I'd like a second opinion on:\n${st.feedback.note||'(see attached report)'}\n\nI'll attach my exported report (use "Export My Report" first, then attach the downloaded file).\n\nThanks,\n${st.name||''}`);
    try{window.location.href=`mailto:${CONTACT_EMAIL}?subject=${subj}&body=${body}`;flash('Opening your email app. Attach your exported report file.');}
    catch(e){flash(`Email this report to ${CONTACT_EMAIL}.`);}
  };
  const saveProgress=async()=>{const ok=await saveState(st);flash(ok?'Progress saved.':'Save failed — please Export your data as backup.');};
  const handleFinish=async(finalSt)=>{
    set(p=>({...p,view:'udash'}));
    if(SHEET_URL){
      flash('Sending your results...');
      const ok=await submitToSheet(finalSt);
      flash(ok?'Results sent. Thank you!':'Could not send automatically — please use Export My Report and email it.');
    }
  };

  const VIEWS={
    welcome:<WelcomeView st={st} set={set}/>,
    intake:<IntakeView st={st} set={set}/>,
    scores:<ScoresView st={st} set={set} which="bScore"/>,
    intel:<IntelView st={st} set={set}/>,
    precision:<PrecisionView st={st} set={set}/>,
    jmap:<JMapView st={st} set={set}/>,
    aibound:<AIBoundView st={st} set={set}/>,
    story:<StoryView st={st} set={set}/>,
    place:<PlaceView st={st} set={set}/>,
    pace:<PaceView st={st} set={set}/>,
    milestones:<MilestoneView st={st} set={set}/>,
    final:<FinalView st={st} set={set} onSubmit={handleFinish}/>,
    udash:<UserDashView st={st} set={set} onReport={exportReport} onEmail={emailReport}/>,
    info:<InfoView/>,
  };

  return(
    <div style={{fontFamily:"'Plus Jakarta Sans','Segoe UI',system-ui,sans-serif",background:BG,minHeight:'100vh',display:'flex',flexDirection:'column',fontSize:14}}>
      <header style={{background:N,color:CA,padding:'0 16px',display:'flex',alignItems:'center',height:54,flexShrink:0,boxShadow:'0 2px 12px rgba(0,0,0,0.25)',zIndex:100}}>
        <button type="button" onClick={()=>setSideOpen(!sideOpen)} aria-label="Menu" title="Show or hide the menu" style={{background:sideOpen?'transparent':'rgba(255,255,255,0.12)',border:'1px solid rgba(255,255,255,0.25)',borderRadius:7,color:CA,cursor:'pointer',fontSize:15,padding:'5px 10px',marginRight:10,display:'flex',alignItems:'center',gap:6,fontFamily:'inherit',fontWeight:600}}>☰ <span style={{fontSize:12}}>Menu</span></button>
        <Logo size={28} reversed={true}/>
        <div style={{marginLeft:10}}><div style={{display:'flex',alignItems:'baseline',gap:6}}><Wordmark size={18} color={CA}/><span style={{fontSize:10,fontWeight:600,color:'rgba(255,255,255,0.45)'}}>{VERSION}</span></div><div style={{fontSize:10,color:T,fontWeight:600,display:isMobile?'none':'block'}}>Human judgment, precisely placed.</div></div>
        <div style={{flex:1}}/>
        {savedTick&&<span style={{fontSize:11,color:'rgba(255,255,255,0.7)',marginRight:10,display:'flex',alignItems:'center',gap:4}}>Saved ✓</span>}
        <button type="button" onClick={()=>setTheme(t=>t==='dark'?'light':'dark')} aria-label={theme==='dark'?'Switch to light mode':'Switch to dark mode'} title={theme==='dark'?'Switch to light mode':'Switch to dark mode'} style={{background:'rgba(255,255,255,0.12)',border:'1px solid rgba(255,255,255,0.25)',borderRadius:7,color:CA,cursor:'pointer',fontSize:14,padding:'5px 10px',marginRight:isMobile?0:10,fontFamily:'inherit'}}>{theme==='dark'?'☀':'☾'}</button>
        <div style={{display:isMobile?'none':'flex',gap:6}}>
          <Btn onClick={saveProgress} variant="ghost" size="sm" style={{color:CA,borderColor:'rgba(255,255,255,0.25)'}}>Save</Btn>
          <Btn onClick={exportJSON} variant="ghost" size="sm" style={{color:CA,borderColor:'rgba(255,255,255,0.25)'}}>Export Data</Btn>
          <Btn onClick={()=>{flash('Opening print dialog...');setTimeout(()=>window.print(),300);}} variant="ghost" size="sm" style={{color:CA,borderColor:'rgba(255,255,255,0.25)'}}>Print</Btn>
          <Btn onClick={resetData} variant="ghost" size="sm" style={{color:'#fca5a5',borderColor:'rgba(252,165,165,0.25)'}}>Reset</Btn>
        </div>
      </header>

      <div style={{display:'flex',flex:1,overflow:'hidden'}}>
        {sideOpen&&isMobile&&(<div onClick={()=>setSideOpen(false)} style={{position:'fixed',top:54,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.4)',zIndex:90}}/>)}
        {sideOpen&&(
          <nav style={isMobile?{position:'fixed',top:54,left:0,bottom:0,width:230,background:N,color:CA,overflowY:'auto',zIndex:95,boxShadow:'4px 0 24px rgba(0,0,0,0.35)'}:{width:210,background:N,color:CA,flexShrink:0,overflowY:'auto'}}>
            <div style={{padding:'6px 0'}}>{NAV_ITEMS.map(item=>{const isDone=st.done.includes(item.id);const isCur=st.view===item.id;return(<button key={item.id} type="button" onClick={()=>nav(item.id)} style={{width:'100%',padding:'8px 12px 8px 14px',textAlign:'left',background:isCur?T:'transparent',border:'none',color:isCur?CA:'rgba(255,255,255,0.75)',cursor:'pointer',fontFamily:'inherit',fontSize:12,fontWeight:isCur?700:400,display:'flex',alignItems:'center',gap:8,borderLeft:`3px solid ${isCur?CA:isDone?T:'transparent'}`}}><span style={{fontSize:12,opacity:isCur?1:0.65}}>{item.icon}</span><span style={{flex:1}}>{item.label}</span>{isDone&&!isCur&&<span style={{fontSize:8,color:T}}>✓</span>}</button>);})}</div>
            <div style={{padding:'10px 12px',borderTop:'1px solid rgba(255,255,255,0.08)'}}><Btn onClick={exportReport} variant="secondary" size="sm" style={{width:'100%',justifyContent:'center',fontSize:11}}>Export My Report</Btn></div>
            {isMobile&&(<div style={{padding:'10px 12px',borderTop:'1px solid rgba(255,255,255,0.08)',display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}><Btn onClick={saveProgress} variant="secondary" size="sm" style={{justifyContent:'center',fontSize:11}}>Save</Btn><Btn onClick={exportJSON} variant="secondary" size="sm" style={{justifyContent:'center',fontSize:11}}>Export Data</Btn><Btn onClick={()=>{flash('Opening print dialog...');setTimeout(()=>window.print(),300);}} variant="secondary" size="sm" style={{justifyContent:'center',fontSize:11}}>Print</Btn><Btn onClick={resetData} variant="secondary" size="sm" style={{justifyContent:'center',fontSize:11,color:'#fca5a5'}}>Reset</Btn></div>)}
            <div style={{padding:'10px 12px',borderTop:'1px solid rgba(255,255,255,0.06)'}}><div style={{fontSize:10,color:'rgba(255,255,255,0.3)',lineHeight:1.55}}>A professional-development prototype. Not legal, HR, or employment advice. No outcome guarantees. Saved on your device; results are sent only when you choose Finish.</div></div>
          </nav>
        )}
        <main ref={mainRef} style={{flex:1,overflowY:'auto',padding:isMobile?'18px 16px':'28px 32px'}}>
          {(()=>{const FLOW=['intake','scores','intel','precision','jmap','aibound','story','place','pace','milestones','final'];const idx=FLOW.indexOf(st.view);if(idx<0)return null;const pct=Math.round(((idx+1)/FLOW.length)*100);return(<div style={{maxWidth:760,margin:'0 auto 18px'}}><div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:TL,marginBottom:4}}><span>Step {idx+1} of {FLOW.length}</span><span>{pct}% through</span></div><div style={{background:BO,borderRadius:100,height:6,overflow:'hidden'}}><div style={{width:pct+'%',height:'100%',background:T,borderRadius:100,transition:'width 0.4s'}}/></div></div>);})()}
          {welcomeBack&&(<div style={{maxWidth:760,margin:'0 auto 18px',display:'flex',alignItems:'center',gap:12,padding:'12px 16px',borderRadius:10,background:TLt,border:`1px solid ${T}40`,color:TX,fontSize:13}}><span style={{fontSize:16}}>👋</span><span style={{flex:1}}>Welcome back — your work was saved. You're picking up right where you left off.</span><button type="button" onClick={()=>setWelcomeBack(false)} style={{background:'none',border:'none',color:TL,cursor:'pointer',fontSize:16,fontFamily:'inherit'}}>×</button></div>)}
          {VIEWS[st.view]||VIEWS.welcome}
        </main>      </div>

      {toast&&<div style={{position:'fixed',bottom:24,left:'50%',transform:'translateX(-50%)',background:N,color:CA,padding:'12px 22px',borderRadius:10,fontSize:13,fontWeight:600,boxShadow:'0 6px 24px rgba(0,0,0,0.3)',zIndex:1000,maxWidth:'90vw',textAlign:'center'}}>{toast}</div>}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<Prairos />);
</script>
</body>
</html>
